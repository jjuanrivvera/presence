site_name: Plexus
site_description: A registry, cockpit, and event-injection layer for coding-agent sessions across your machines — presence + edc.
site_url: https://jjuanrivvera.github.io/presence/
repo_url: https://github.com/jjuanrivvera/presence
repo_name: jjuanrivvera/presence
edit_uri: edit/main/docs/

theme:
  name: material
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: blue grey
      accent: amber
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: blue grey
      accent: amber
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - search.highlight
    - search.suggest
    - content.code.copy
    - toc.follow
  icon:
    repo: fontawesome/brands/github

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - tables
  - toc:
      permalink: true
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.inlinehilite
  - pymdownx.tabbed:
      alternate_style: true

plugins:
  - search

nav:
  - Home: index.md
  - Concepts:
      - Architecture: architecture.md
      - Agents: agents.md
  - Tools:
      - presence: presence.md
      - edc: edc.md
  - Guides:
      - Setup & requirements: setup.md
      - Command reference: commands.md
