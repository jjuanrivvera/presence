<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>mesh — presence</title>
<meta name="theme-color" content="#16181d">
<link rel="manifest" href="/manifest.json">
<link rel="icon" href="/icon.svg">
<link rel="apple-touch-icon" href="/icon.svg">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="mesh">
<style>
  :root {
    --bg: #16181d; --card: #1f2229; --fg: #e8e8e3; --muted: #8b8f98; --border: #2b2f38;
    --mac: #3987e5; --pc: #1baf7a; --vps: #9085e9; --other: #6b7280;
    --busy: #35c26e; --idle: #6b7280; --blocked: #e05252;
    --ok: #35c26e; --warn: #e5a53a; --bad: #e05252;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--bg); color: var(--fg);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    min-height: 100vh; padding: 1rem;
    padding-top: max(1rem, env(safe-area-inset-top));
    padding-bottom: max(1rem, env(safe-area-inset-bottom));
  }
  .mono { font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; }
  header {
    display: flex; align-items: baseline; justify-content: space-between; flex-wrap: wrap;
    gap: .5rem; max-width: 960px; margin: 0 auto .9rem;
  }
  h1 { font-size: 1.15rem; font-weight: 600; letter-spacing: .02em; }
  h1 .dim { color: var(--muted); font-weight: 400; }
  #status { color: var(--muted); font-size: .82rem; }
  #status .err { color: var(--bad); }
  main { max-width: 960px; margin: 0 auto; }

  /* summary bar — counts at a glance, blocked first */
  #summary { display: flex; gap: .5rem; max-width: 960px; margin: 0 auto .9rem; flex-wrap: wrap; }
  #summary.hidden { display: none; }
  .stat {
    display: inline-flex; align-items: center; gap: .4rem; font-size: .85rem; font-weight: 600;
    padding: .35rem .7rem; border-radius: 999px; background: var(--card); border: 1px solid var(--border);
  }
  .stat .d { width: 9px; height: 9px; border-radius: 50%; }
  .stat.blocked { color: #fff; background: var(--blocked); border-color: var(--blocked); }
  .stat.blocked.zero { display: none; }
  .stat.working .d { background: var(--busy); }
  .stat.idle .d { background: var(--idle); }

  #token-gate {
    max-width: 420px; margin: 15vh auto 0; background: var(--card); border: 1px solid var(--border);
    border-radius: 12px; padding: 1.5rem; display: none;
  }
  #token-gate.visible { display: block; }
  #token-gate p { color: var(--muted); font-size: .9rem; margin-bottom: 1rem; }
  #token-gate .row { display: flex; gap: .5rem; }
  #token-input {
    flex: 1; background: var(--bg); border: 1px solid var(--border); border-radius: 8px;
    color: var(--fg); padding: .55rem .75rem; font-size: .9rem;
  }
  #token-input:focus { outline: 1px solid var(--mac); }
  button {
    background: var(--mac); border: none; border-radius: 8px; color: #fff;
    padding: .55rem 1rem; font-size: .9rem; cursor: pointer;
  }
  button.ghost {
    background: transparent; border: 1px solid var(--border); color: var(--muted);
    padding: .3rem .7rem; font-size: .78rem;
  }
  button.ghost:hover { color: var(--fg); border-color: var(--muted); }

  #grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: .9rem; }
  .card {
    background: var(--card); border: 1px solid var(--border); border-radius: 12px; padding: 1rem;
    display: flex; flex-direction: column; gap: .55rem;
  }
  .card.blocked { border-color: var(--blocked); box-shadow: 0 0 0 1px var(--blocked); }
  .card .top { display: flex; align-items: center; justify-content: space-between; gap: .4rem; flex-wrap: wrap; }
  .chip {
    font-size: .7rem; font-weight: 600; letter-spacing: .05em; text-transform: uppercase;
    padding: .18rem .5rem; border-radius: 999px; color: #fff;
  }
  .chip.agent { background: transparent; border: 1px solid var(--border); color: var(--muted); }
  .badge { font-size: .7rem; font-weight: 700; letter-spacing: .04em; text-transform: uppercase; padding: .18rem .5rem; border-radius: 999px; }
  .badge.busy { background: rgba(53,194,110,.15); color: var(--busy); }
  .badge.idle { background: rgba(107,114,128,.18); color: #9aa0aa; }
  .badge.blocked { background: var(--blocked); color: #fff; }
  .repo { font-size: 1.12rem; font-weight: 650; line-height: 1.25; word-break: break-word; }
  .repo .branch { color: var(--muted); font-weight: 400; font-size: .92rem; }
  .repo .none { color: var(--muted); font-weight: 400; font-size: .95rem; }
  .meta { display: flex; align-items: center; justify-content: space-between; gap: .5rem; color: var(--muted); font-size: .8rem; flex-wrap: wrap; }
  .port { color: var(--fg); } .port.none { color: var(--muted); }
  .fresh { display: inline-flex; align-items: center; gap: .35rem; white-space: nowrap; }
  .dot { width: 8px; height: 8px; border-radius: 50%; display: inline-block; }
  .dot.ok { background: var(--ok); } .dot.warn { background: var(--warn); } .dot.bad { background: var(--bad); }
  .sid { color: var(--muted); font-size: .72rem; word-break: break-all; }
  .attach {
    display: inline-block; align-self: flex-start; font-size: .82rem; font-weight: 600;
    color: #fff; background: var(--mac); padding: .4rem .8rem; border-radius: 8px; text-decoration: none;
  }
  .attach:hover { filter: brightness(1.12); }
  .card.blocked .attach { background: var(--blocked); }

  #empty { color: var(--muted); text-align: center; padding: 4rem 1rem; font-size: .95rem; display: none; }
  #empty.visible { display: block; }

  @media (max-width: 480px) { body { padding: .8rem; } #grid { grid-template-columns: 1fr; } }
</style>
</head>
<body>
<header>
  <h1>mesh <span class="dim">— la manada</span></h1>
  <div style="display:flex;align-items:center;gap:.75rem">
    <span id="status">—</span>
    <button class="ghost" id="change-token">token</button>
  </div>
</header>

<div id="summary" class="hidden"></div>

<div id="token-gate">
  <p>Pega el token del mesh para ver las sesiones vivas.</p>
  <div class="row">
    <input id="token-input" type="password" class="mono" placeholder="PRESENCE_TOKEN" autocomplete="off">
    <button id="token-save">entrar</button>
  </div>
</div>

<main>
  <div id="grid"></div>
  <div id="empty">sin sesiones vivas</div>
</main>

<script>
(function () {
  "use strict";
  var KEY = "presence_token";
  var gate = document.getElementById("token-gate");
  var grid = document.getElementById("grid");
  var empty = document.getElementById("empty");
  var summary = document.getElementById("summary");
  var statusEl = document.getElementById("status");
  var input = document.getElementById("token-input");
  var lastFetch = 0, timer = null;
  var HOST_COLORS = { mac: "var(--mac)", pc: "var(--pc)", vps: "var(--vps)" };
  var RANK = { blocked: 0, busy: 1, idle: 2 };

  function token() { return localStorage.getItem(KEY) || ""; }

  // Sync the auth cookie so link navigations to /attach/* carry auth (fetch can send
  // the bearer header, but a clicked <a> or a WebSocket handshake cannot). Best-effort.
  function ensureCookie(v) {
    return fetch("/login", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ token: v })
    });
  }

  function showGate() {
    if (timer) { clearInterval(timer); timer = null; }
    gate.classList.add("visible");
    grid.innerHTML = ""; empty.classList.remove("visible");
    summary.classList.add("hidden");
    statusEl.textContent = "token requerido";
    input.focus();
  }
  function startPolling() {
    gate.classList.remove("visible");
    if (timer) clearInterval(timer);
    poll(); timer = setInterval(poll, 2000);
  }

  function ago(s) { return s < 60 ? "hace " + s + "s" : s < 3600 ? "hace " + Math.floor(s/60) + "m" : "hace " + Math.floor(s/3600) + "h"; }
  function freshClass(s) { return s < 60 ? "ok" : s < 120 ? "warn" : "bad"; }
  function esc(s) { return String(s == null ? "" : s).replace(/[&<>"']/g, function (c) { return { "&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;" }[c]; }); }
  function stateOf(r) { return r.state === "blocked" ? "blocked" : r.state === "idle" ? "idle" : "busy"; }

  function card(row) {
    var secs = (function () { var t = Date.parse(row.last_seen); return isNaN(t) ? 999999 : Math.max(0, Math.round((Date.now() - t) / 1000)); })();
    var color = HOST_COLORS[row.host] || "var(--other)";
    var st = stateOf(row);
    var port = row.inject_port > 0 ? '<span class="port mono">&#9889; ' + row.inject_port + "</span>" : '<span class="port none">no inyectable</span>';
    var repo = row.repo ? esc(row.repo) : '<span class="none">(sin repo)</span>';
    var branch = row.branch ? ' <span class="branch mono">' + esc(row.branch) + "</span>" : "";
    var agent = row.agent ? '<span class="chip agent">' + esc(row.agent) + "</span>" : "";
    return '<div class="card ' + (st === "blocked" ? "blocked" : "") + '">' +
      '<div class="top">' +
        '<span class="chip" style="background:' + color + '">' + esc(row.host) + "</span>" + agent +
        '<span class="badge ' + st + '">' + (st === "blocked" ? "⚑ blocked" : st) + "</span>" +
      "</div>" +
      '<div class="repo">' + repo + branch + "</div>" +
      '<div class="meta">' + port + '<span class="fresh"><span class="dot ' + freshClass(secs) + '"></span>' + ago(secs) + "</span></div>" +
      (row.attach_addr ? '<a class="attach" href="/attach/' + encodeURIComponent(row.session_id) + '/" target="_blank" rel="noopener">▸ attach</a>' : "") +
      '<div class="sid mono">' + esc(row.session_id) + "</div></div>";
  }

  function renderSummary(rows) {
    var b = 0, w = 0, i = 0;
    rows.forEach(function (r) { var s = stateOf(r); if (s === "blocked") b++; else if (s === "busy") w++; else i++; });
    summary.classList.remove("hidden");
    summary.innerHTML =
      '<span class="stat blocked' + (b ? "" : " zero") + '">⚑ ' + b + " blocked</span>" +
      '<span class="stat working"><span class="d"></span>' + w + " working</span>" +
      '<span class="stat idle"><span class="d"></span>' + i + " idle</span>";
  }

  function render(rows) {
    rows = (rows || []).slice().sort(function (a, b) {
      var ra = RANK[stateOf(a)], rb = RANK[stateOf(b)];
      if (ra !== rb) return ra - rb;
      return (b.last_seen || "").localeCompare(a.last_seen || "");
    });
    if (!rows.length) { grid.innerHTML = ""; empty.classList.add("visible"); summary.classList.add("hidden"); }
    else { empty.classList.remove("visible"); grid.innerHTML = rows.map(card).join(""); renderSummary(rows); }
    var n = rows.length, since = Math.round((Date.now() - lastFetch) / 1000);
    statusEl.textContent = n + (n === 1 ? " sesión" : " sesiones") + " · hace " + since + "s";
  }

  function poll() {
    fetch("/list?fresh=10m", { headers: { Authorization: "Bearer " + token() } })
      .then(function (resp) {
        if (resp.status === 401) { showGate(); throw new Error("unauthorized"); }
        if (!resp.ok) throw new Error("http " + resp.status);
        return resp.json();
      })
      .then(function (rows) { lastFetch = Date.now(); render(rows); })
      .catch(function (err) { if (err.message !== "unauthorized") statusEl.innerHTML = '<span class="err">sin conexión</span>'; });
  }

  document.getElementById("token-save").addEventListener("click", function () {
    var v = input.value.trim(); if (!v) return;
    localStorage.setItem(KEY, v); input.value = "";
    ensureCookie(v).then(startPolling, startPolling);
  });
  input.addEventListener("keydown", function (e) { if (e.key === "Enter") document.getElementById("token-save").click(); });
  document.getElementById("change-token").addEventListener("click", function () { localStorage.removeItem(KEY); showGate(); });

  if ("serviceWorker" in navigator) navigator.serviceWorker.register("/sw.js").catch(function () {});
  if (token()) ensureCookie(token()).then(startPolling, startPolling); else showGate();
})();
</script>
</body>
</html>
