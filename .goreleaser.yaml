version: 2

project_name: plexus

builds:
  - id: plexus
    main: .
    binary: plexus
    env:
      - CGO_ENABLED=0
    goos:
      - darwin
      - linux
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w
      - -X github.com/jjuanrivvera/plexus/internal/version.Version={{.Version}}
      - -X github.com/jjuanrivvera/plexus/internal/version.Commit={{.ShortCommit}}

archives:
  - id: default
    formats: [tar.gz]
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    files:
      - README.md
      - hooks/*

checksum:
  name_template: "checksums.txt"

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"

release:
  draft: false
